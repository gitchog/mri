# Robustness Study Configuration

# This configuration file contains parameters for conducting a robustness study.
parameters:
  - name: "Study Sample Size"
    value: 100
    description: "Number of samples to include in the robustness study."
  - name: "Variability"
    value: "low"
    description: "Expected variability in the study samples. Options: low, medium, high."
  - name: "Test Methods"
    value: ["method1", "method2", "method3"]
    description: "List of test methods to be evaluated."
  - name: "Confidence Level"
    value: 0.95
    description: "The confidence level for statistical tests."
